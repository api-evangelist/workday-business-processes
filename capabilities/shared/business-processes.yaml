naftiko: "1.0.0-alpha1"

info:
  label: "Workday Business Process API"
  description: "Shared capability definition for Workday Business Process API operations covering process definitions, process instances, inbox items, approvals, and workflow management."
  tags:
    - Approvals
    - Business Processes
    - Enterprise
    - HCM
    - Workflows
    - Workday
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      WORKDAY_CLIENT_ID: WORKDAY_CLIENT_ID
      WORKDAY_CLIENT_SECRET: WORKDAY_CLIENT_SECRET
      WORKDAY_TENANT: WORKDAY_TENANT

capability:
  consumes:
    - openapi: workday-business-processes
      location: ../../openapi/workday-business-processes-openapi.yml

  exposes:
    - type: rest
      port: 8100
      namespace: workday-business-processes-api
      description: "REST API for Workday Business Process operations."
      resources:
        - path: /v1/business-process-definitions
          name: business-process-definitions
          description: "Business process definitions"
          operations:
            - method: GET
              name: list-business-process-definitions
              description: "List business process definitions"
              call: "workday-business-processes.listBusinessProcessDefinitions"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/business-process-definitions/{definitionId}
          name: business-process-definition-by-id
          description: "Single business process definition"
          operations:
            - method: GET
              name: get-business-process-definition
              description: "Get a business process definition"
              call: "workday-business-processes.getBusinessProcessDefinition"
              with:
                definitionId: "rest.definitionId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/process-instances
          name: process-instances
          description: "Process instances management"
          operations:
            - method: GET
              name: list-process-instances
              description: "List process instances"
              call: "workday-business-processes.listProcessInstances"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: initiate-process
              description: "Initiate a new process"
              call: "workday-business-processes.initiateProcess"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/process-instances/{instanceId}
          name: process-instance-by-id
          description: "Single process instance"
          operations:
            - method: GET
              name: get-process-instance
              description: "Get a process instance"
              call: "workday-business-processes.getProcessInstance"
              with:
                instanceId: "rest.instanceId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/process-instances/{instanceId}/steps
          name: process-steps
          description: "Process steps"
          operations:
            - method: GET
              name: list-process-steps
              description: "List process steps"
              call: "workday-business-processes.listProcessSteps"
              with:
                instanceId: "rest.instanceId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/inbox-items
          name: inbox-items
          description: "Inbox items management"
          operations:
            - method: GET
              name: list-inbox-items
              description: "List inbox items"
              call: "workday-business-processes.listInboxItems"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/inbox-items/{itemId}/approve
          name: inbox-item-approve
          description: "Approve inbox item"
          operations:
            - method: POST
              name: approve-inbox-item
              description: "Approve an inbox item"
              call: "workday-business-processes.approveInboxItem"
              with:
                itemId: "rest.itemId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/inbox-items/{itemId}/deny
          name: inbox-item-deny
          description: "Deny inbox item"
          operations:
            - method: POST
              name: deny-inbox-item
              description: "Deny an inbox item"
              call: "workday-business-processes.denyInboxItem"
              with:
                itemId: "rest.itemId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: workday-business-processes-mcp
      transport: http
      description: "MCP server for Workday Business Process API operations."
      tools:
        - name: list-business-process-definitions
          description: "List Workday business process type definitions"
          hints:
            readOnly: true
            openWorld: true
          call: "workday-business-processes.listBusinessProcessDefinitions"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-business-process-definition
          description: "Get a specific Workday business process definition"
          hints:
            readOnly: true
          call: "workday-business-processes.getBusinessProcessDefinition"
          with:
            definitionId: "tools.definitionId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-process-instances
          description: "List Workday business process instances with optional filtering"
          hints:
            readOnly: true
          call: "workday-business-processes.listProcessInstances"
          outputParameters:
            - type: object
              mapping: "$."
        - name: initiate-process
          description: "Initiate a new Workday business process instance"
          hints:
            readOnly: false
          call: "workday-business-processes.initiateProcess"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-process-instance
          description: "Get the status and details of a specific process instance"
          hints:
            readOnly: true
          call: "workday-business-processes.getProcessInstance"
          with:
            instanceId: "tools.instanceId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-process-steps
          description: "List the steps for a business process instance"
          hints:
            readOnly: true
          call: "workday-business-processes.listProcessSteps"
          with:
            instanceId: "tools.instanceId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-inbox-items
          description: "List Workday inbox items requiring action"
          hints:
            readOnly: true
          call: "workday-business-processes.listInboxItems"
          outputParameters:
            - type: object
              mapping: "$."
        - name: approve-inbox-item
          description: "Approve a Workday business process inbox item"
          hints:
            readOnly: false
          call: "workday-business-processes.approveInboxItem"
          with:
            itemId: "tools.itemId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: deny-inbox-item
          description: "Deny a Workday business process inbox item"
          hints:
            readOnly: false
          call: "workday-business-processes.denyInboxItem"
          with:
            itemId: "tools.itemId"
          outputParameters:
            - type: object
              mapping: "$."
